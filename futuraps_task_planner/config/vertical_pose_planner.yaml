vertical_pose_planner:
  ros__parameters:
    use_sim_time: true

    planning_group: "ur10_arm"
    target_frame: "platform_link"
    map_frame: "map"
    base_frame: "platform_link"
    execute: true

    planning_time: 1.5
    planning_attempts: 3
    pipeline_id: "ompl"
    planner_id: ""
    max_velocity_scaling: 0.15
    max_acceleration_scaling: 0.15

    plan_period_s: 0.5
    perception_dt_s: 0.1
    wait_for_state_timeout_s: 3.0
    joint_states_topic: "/joint_states"
    max_joint_state_age_s: 1.0

    required_joints:
      - "shoulder_pan_joint"
      - "shoulder_lift_joint"
      - "elbow_joint"
      - "wrist_1_joint"
      - "wrist_2_joint"
      - "wrist_3_joint"

    ik_timeout_s: 0.05
    ik_attempts: 4

    closest_srv: "/get_closest_grid"
    normal_srv: "/get_global_normal"
    perception_timeout_s: 0.3

    cell_size: 1.5
    rows: 1
    cols: 1
    x0: -0.75
    z0: 0.2
    y_left_max: 2.0
    y_right_max: 2.0
    side: 0
    front_percentile: 0.01
    min_points_per_cell: 20

    normal_min_x: -0.5
    normal_max_x: 0.5
    normal_min_y: -2.0
    normal_max_y: 2.0
    normal_min_z: 0.2
    normal_max_z: 2.0

    standoff_m: 0.20
    z_target: 1.0
    filter_tau_s: 0.20
    tool_axis_forward: 2
    tool_roll_orientation: -1.57
    point_tool_into_surface: true

    replan_pos_threshold_m: 0.015
    replan_angle_threshold_rad: 0.10
    failed_plan_cooldown_s: 1.0
    successful_plan_cooldown_s: 0.25

    platform_speed_mps: 0.0
    lookahead_time_s: 0.0
    auto_enable_spray: true
    spray_enabled_topic: "/spray/enabled"
